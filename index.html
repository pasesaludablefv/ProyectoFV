<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Proyecto F&V · CLN0001</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f7f0;
            font-family: system-ui, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 700px;
            width: 100%;
            border-radius: 48px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            border: 1px solid #d9e8d6;
        }
        h1 {
            color: #1f5e3a;
            font-size: 2.2rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .sub {
            color: #3b6e47;
            margin-bottom: 35px;
            font-size: 1rem;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 20px;
        }
        .btn {
            background: #2b7a4b;
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }
        .btn-mapa {
            background: #1e4663;
        }
        .btn-mapa:hover { background: #0f2f4a; transform: scale(1.02);}
        .btn:hover { background: #1f5e3a; transform: scale(1.02);}
        footer {
            margin-top: 35px;
            font-size: 0.75rem;
            color: #5a6e55;
            border-top: 1px solid #e2f0e0;
            padding-top: 20px;
        }
        @media (max-width: 500px) {
            .card { padding: 30px 20px; }
            .btn { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🥗 Proyecto F&V · CLN0001</h1>
    <div class="sub">Herramientas para el equipo de investigación y docentes</div>
    <div class="btn-group">
        <a href="https://pasesaludablefv.github.io/ProyectoFV/mapa.html" class="btn btn-mapa">🗺️ Ver mapa de escuelas</a>
        <a href="https://pasesaludablefv.github.io/ProyectoFV/planificador.html" class="btn">📅 Planificador docente</a>
    </div>
    <footer>
        🔗 Selecciona la herramienta que necesitas.<br>
        Los enlaces funcionan directamente si los archivos <strong>mapa.html</strong> y <strong>planificador.html</strong> están en la misma carpeta.
    </footer>
</div>
</body>
</html>
