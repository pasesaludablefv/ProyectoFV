<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Proyecto F&V · CLN0001</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: linear-gradient(145deg, #e6f0e6 0%, #cde0cd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 720px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 40px 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255,255,255,0.6);
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,240,0.6);
        }

        h1 {
            color: #1a4a2f;
            font-size: clamp(1.8rem, 7vw, 2.5rem);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            letter-spacing: -0.3px;
            font-weight: 700;
        }

        .sub {
            color: #2d6a44;
            font-size: clamp(0.9rem, 4vw, 1.05rem);
            margin-bottom: 40px;
            padding: 0 12px;
            font-weight: 500;
            background: #eef5ea80;
            display: inline-block;
            border-radius: 60px;
            padding: 6px 20px;
            backdrop-filter: blur(2px);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 40px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background: #2b7a4b;
            color: white;
            text-decoration: none;
            border-radius: 80px;
            font-weight: 700;
            font-size: clamp(1rem, 4.5vw, 1.1rem);
            transition: all 0.2s ease;
            text-align: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.08);
            letter-spacing: 0.3px;
        }

        /* Botón 1: mapa general - azul elegante */
        .btn-mapa-general {
            background: #1e4a6e;
            border-bottom: 2px solid #0f3550;
        }
        .btn-mapa-general:hover {
            background: #0f3b57;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -6px rgba(0,0,0,0.2);
        }

        /* Botón 2: sector 12 - verde esmeralda */
        .btn-sector12 {
            background: #0f6b3a;
            border-bottom: 2px solid #0a4f2a;
        }
        .btn-sector12:hover {
            background: #0b562f;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -6px rgba(0,0,0,0.2);
        }

        /* Botón 3: estratos económicos - morado/terracota */
        .btn-estratos {
            background: #6b21a5;
            border-bottom: 2px solid #4a1d73;
        }
        .btn-estratos:hover {
            background: #581c87;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -6px rgba(0,0,0,0.2);
        }

        /* Botón 4: planificador docente - naranja/terracota */
        .btn-planificador {
            background: #c45c1b;
            border-bottom: 2px solid #9a4512;
        }
        .btn-planificador:hover {
            background: #a84d13;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -6px rgba(0,0,0,0.2);
        }

        /* Botón 5: mapa general con top 25 - teal */
        .btn-top25 {
            background: #0f5e5e;
            border-bottom: 2px solid #0a4545;
        }
        .btn-top25:hover {
            background: #0d4a4a;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -6px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        footer {
            font-size: 0.75rem;
            color: #4a6741;
            border-top: 1px solid #d9e8d4;
            padding-top: 22px;
            margin-top: 10px;
            font-weight: 500;
            background: transparent;
        }

        /* Mejora para móviles: más espacio y botones cómodos */
        @media (max-width: 550px) {
            .container {
                padding: 28px 20px;
                border-radius: 40px;
            }
            .btn {
                padding: 14px 18px;
            }
            .sub {
                margin-bottom: 28px;
            }
        }

        /* Pantallas grandes: botones en fila */
        @media (min-width: 680px) {
            .buttons {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 18px;
            }
            .btn {
                width: auto;
                min-width: 210px;
                flex: 1 0 auto;
                padding: 14px 16px;
            }
        }

        @media (min-width: 900px) {
            .container {
                max-width: 950px;
            }
            .btn {
                min-width: 200px;
                font-size: 0.95rem;
            }
        }

        .container {
            animation: fadeSlideUp 0.4s ease-out;
        }
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🥗 Proyecto F&V · CLN0001</h1>
    <div class="sub">Herramientas para el equipo de investigación</div>
    <div class="buttons">
        <a href="mapaescolar3.html" class="btn btn-estratos">🗺️ Sistema de Priorización Escolar</a>
        <a href="mapaescolar.html" class="btn btn-mapa-general">📊 Top 50 escuelas (Para referencia)</a>
        <a href="planificador.html" class="btn btn-planificador">📅 Planificador docente</a>
    </div>
    <footer>
        🔗 Herramientas diseñadas para docentes e investigadores del proyecto.<br>
        Selecciona la vista que necesites.
    </footer>
</div>
</body>
</html>
