<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto F&V · Herramientas</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f7f0;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1f5e3a;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: #3b6e47;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        a {
            display: inline-block;
            padding: 12px 28px;
            background: #2b7a4b;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.2s;
        }
        a:first-child {
            background: #1e4663;
        }
        a:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥗 Proyecto F&V · CLN0001</h1>
        <p>Selecciona la herramienta que necesitas:</p>
        <div class="buttons">
            <a href="mapaescolar.html">🗺️ Ver mapa de escuelas</a>
            <a href="planificador.html">📅 Planificador docente</a>
        </div>
        <footer>
            🔗 Herramientas para el equipo de investigación y docentes.
        </footer>
    </div>
</body>
</html>
